<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner v4.0 - Compartilhamento Direto</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        h2 { font-size: 1.1rem; margin: 10px 0; color: #333; }
        #reader { width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 400px; margin: 15px 0; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 14px; cursor: pointer; }
        
        .btn-start { background: #007bff; grid-column: span 2; }
        .btn-undo { background: #f1c40f; color: #333; }
        .btn-share { background: #28a745; } /* Botão verde para compartilhar */
        .btn-del { background: #e74c3c; grid-column: span 2; }
        
        #results { width: 100%; max-width: 400px; background: white; border-radius: 12px; padding: 15px; box-sizing: border-box; flex-grow: 1; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 10px; font-weight: bold; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 12px 0; border-bottom: 1px solid #eee; font-family: monospace; font-size: 16px; }
        
        /* Mensagem de espera na tela */
        #msg-status { font-weight: bold; margin: 10px 0; height: 20px; color: #007bff; }
    </style>
</head>
<body>

    <h2>Scanner de Itens</h2>
    <div id="msg-status"></div>
    <div id="reader"></div>

    <div class="btns">
        <button class="btn-start" id="scanBtn" onclick="toggleCamera()">LIGAR CÂMERA</button>
        <button class="btn-undo" onclick="apagarUltimo()">DESFAZER</button>
        <button class="btn-share" onclick="compartilhar()">COMPARTILHAR</button>
        <button class="btn-del" onclick="limpar()">LIMPAR TUDO</button>
    </div>

    <div id="results">
        <div class="header"><span>Lista</span><span id="cont">0</span></div>
        <ul id="lista"></ul>
    </div>

    <script>
        let scans = JSON.parse(localStorage.getItem('meus_scans')) || [];
        let html5QrCode;
        let isCameraOn = false;
        let travado = false;

        function atualizar() {
            document.getElementById('cont').innerText = scans.length;
            document.getElementById('lista').innerHTML = scans.map(s => `<li>${s.v}</li>`).reverse().join('');
        }
        atualizar();

        function toggleCamera() {
            if (!isCameraOn) {
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    if (travado) return;
                    travado = true;

                    const repetido = scans.find(s => s.v === text);
                    
                    if (repetido) {
                        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
                        
                        // ALERTA DE REPETIDO BEM CHAMATIVO
                        alert("❌❌❌ REPETIDO! ❌❌❌\n\nO código [" + text + "] já foi lido antes!");
                        
                        iniciarPausa();
                    } else {
                        if (navigator.vibrate) navigator.vibrate([500, 100, 500]);
                        
                        scans.push({ v: text, t: new Date().toLocaleTimeString() });
                        localStorage.setItem('meus_scans', JSON.stringify(scans));
                        atualizar();
                        
                        // ALERTA DE SUCESSO BEM CHAMATIVO
                        alert("✅✅✅ REGISTRADO! ✅✅✅\n\nCódigo: " + text);
                        
                        iniciarPausa();
                    }
                }).then(() => {
                    isCameraOn = true;
                    document.getElementById('scanBtn').innerText = "DESLIGAR CÂMERA";
                });
            } else {
                location.reload();
            }
        }

        function iniciarPausa() {
            document.getElementById('msg-status').innerText = "⏳ AGUARDE 3 SEGUNDOS...";
            setTimeout(() => {
                document.getElementById('msg-status').innerText = "";
                travado = false;
            }, 3000);
        }

        async function compartilhar() {
            if (scans.length === 0) return alert("Lista vazia!");
            
            const textoParaCompartilhar = "Lista de Códigos Escaneados:\n" + scans.map(s => s.v).join('\n');

            // Verifica se o celular suporta a função de compartilhar do sistema
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Relatório de Scans',
                        text: textoParaCompartilhar
                    });
                } catch (err) {
                    console.log("Erro ao compartilhar");
                }
            } else {
                // Caso o navegador seja antigo, ele copia para a área de transferência
                navigator.clipboard.writeText(textoParaCompartilhar);
                alert("Compartilhamento não suportado. Lista copiada para a área de transferência!");
            }
        }

        function apagarUltimo() { if(confirm("Apagar último?")) { scans.pop(); localStorage.setItem('meus_scans', JSON.stringify(scans)); atualizar(); } }
        function limpar() { if(confirm("Limpar tudo?")) { scans = []; localStorage.clear(); atualizar(); } }
    </script>
</body>
</html>
