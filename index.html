<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner v3.0 - Ultra Seguro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; transition: background 0.3s; }
        h2 { font-size: 1.1rem; margin: 10px 0; }
        #reader { width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 400px; margin: 15px 0; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 14px; cursor: pointer; }
        .btn-start { background: #007bff; grid-column: span 2; }
        .btn-undo { background: #f1c40f; color: #333; }
        .btn-save { background: #2ecc71; }
        .btn-del { background: #e74c3c; grid-column: span 2; }
        #results { width: 100%; max-width: 400px; background: white; border-radius: 12px; padding: 15px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 10px; font-weight: bold; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 12px 0; border-bottom: 1px solid #eee; font-family: monospace; font-size: 16px; }
        /* Cores de fundo para os estados */
        .bg-sucesso { background: #2ecc71 !important; }
        .bg-erro { background: #e74c3c !important; }
        .bg-espera { background: #3498db !important; }
    </style>
</head>
<body>

    <h2>Scanner de Itens</h2>
    <div id="reader"></div>

    <div class="btns">
        <button class="btn-start" id="scanBtn" onclick="toggleCamera()">LIGAR CÂMERA</button>
        <button class="btn-undo" onclick="apagarUltimo()">DESFAZER</button>
        <button class="btn-save" onclick="exportar()">BAIXAR TXT</button>
        <button class="btn-del" onclick="limpar()">LIMPAR TUDO</button>
    </div>

    <div id="results">
        <div class="header"><span>Itens Lidos</span><span id="cont">0</span></div>
        <ul id="lista"></ul>
    </div>

    <script>
        let scans = JSON.parse(localStorage.getItem('meus_scans')) || [];
        let html5QrCode;
        let isCameraOn = false;
        let travado = false;

        function atualizar() {
            document.getElementById('cont').innerText = scans.length;
            document.getElementById('lista').innerHTML = scans.map(s => `<li>${s.v}</li>`).reverse().join('');
        }
        atualizar();

        function toggleCamera() {
            if (!isCameraOn) {
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    if (travado) return;
                    travado = true; // Trava leitura imediatamente

                    const repetido = scans.find(s => s.v === text);
                    
                    if (repetido) {
                        document.body.className = 'bg-erro';
                        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                        
                        alert("⚠️ ATENÇÃO: CÓDIGO JÁ REPETIDO!");
                        
                        iniciarPausa();
                    } else {
                        document.body.className = 'bg-sucesso';
                        if (navigator.vibrate) navigator.vibrate([400, 100, 400]);
                        
                        scans.push({ v: text, t: new Date().toLocaleTimeString() });
                        localStorage.setItem('meus_scans', JSON.stringify(scans));
                        atualizar();
                        
                        alert("✅ SUCESSO: CÓDIGO REGISTRADO!");
                        
                        iniciarPausa();
                    }
                }).then(() => {
                    isCameraOn = true;
                    document.getElementById('scanBtn').innerText = "DESLIGAR";
                });
            } else {
                location.reload(); // Reset total
            }
        }

        function iniciarPausa() {
            document.body.className = 'bg-espera';
            // Mensagem visual no título enquanto aguarda
            const h2 = document.querySelector('h2');
            const originalH2 = h2.innerText;
            h2.innerText = "⏳ AGUARDE 3 SEGUNDOS...";
            
            setTimeout(() => {
                document.body.className = '';
                h2.innerText = originalH2;
                travado = false; // Libera para a próxima leitura
            }, 3000);
        }

        function apagarUltimo() { if(confirm("Apagar último?")) { scans.pop(); localStorage.setItem('meus_scans', JSON.stringify(scans)); atualizar(); } }
        function limpar() { if(confirm("Limpar tudo?")) { scans = []; localStorage.clear(); atualizar(); } }
        function exportar() {
            const blob = new Blob([scans.map(s => s.v).join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "lista.txt";
            a.click();
        }
    </script>
</body>
</html>
